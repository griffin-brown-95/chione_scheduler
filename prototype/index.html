<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olympic Park — Lane Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A3D5C;--navy-dark:#0E2438;--navy-mid:#2A5478;--navy-light:#4A7FA5;--navy-pale:#E8EFF5;
  --bg:#F4F2ED;--surface:#FFFFFF;--surface2:#EEECE7;--surface3:#E5E3DE;
  --border:rgba(0,0,0,0.09);--border-mid:rgba(0,0,0,0.15);--border-strong:rgba(0,0,0,0.22);
  --text:#1A1916;--text-muted:#6A6860;--text-hint:#9E9C96;
  --gold:#9A7209;--gold-bg:#FBF6E7;--gold-border:rgba(154,114,9,0.25);
  --green:#1B6B3A;--green-bg:#EBF5EE;--green-border:rgba(27,107,58,0.25);
  --red:#B83232;--red-bg:#FCEAEA;--red-border:rgba(184,50,50,0.25);
  --purple:#5B3FA8;--purple-bg:#F0EDFC;--purple-border:rgba(91,63,168,0.25);
  --teal:#0D7A6A;--teal-bg:#E6F4F2;--teal-border:rgba(13,122,106,0.25);
  --r:8px;--r-lg:12px;--r-xl:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;overflow-x:hidden}
#app{display:flex;min-height:100vh}
#sidebar{width:228px;background:var(--navy-dark);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
#main{margin-left:228px;flex:1;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-rings{display:flex;gap:3px;margin-bottom:9px}
.ring{width:13px;height:13px;border-radius:50%;border:2.5px solid;display:inline-block}
.r1{border-color:#4FC3F7}.r2{border-color:#FFD54F}.r3{border-color:#EF5350}.r4{border-color:#66BB6A}.r5{border-color:#EF5350;opacity:.5}
.sb-logo h1{font-family:'Syne',sans-serif;color:#fff;font-size:12.5px;font-weight:600;letter-spacing:.03em;line-height:1.4}
.sb-logo p{color:rgba(255,255,255,.42);font-size:11px;margin-top:2px}
.sb-user{margin:10px 14px;background:rgba(255,255,255,.08);border-radius:7px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
.sb-user-label{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.05em;text-transform:uppercase}
.sb-user-name{font-size:13px;color:#fff;font-weight:500}
.sb-user-team{font-size:11px;color:rgba(255,255,255,.5)}
.nav-section{padding:6px 0}
.nav-sec-lbl{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;padding:4px 16px;margin-top:6px}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 16px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:13px;text-align:left;transition:background .15s,color .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.12);color:#fff}
.nav-btn svg{opacity:.75;flex-shrink:0}.nav-btn.active svg{opacity:1}
.sb-footer{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}
.sb-footer p{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.sb-footer select{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:6px 8px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;outline:none}
.sb-footer select option{background:#0E2438;color:#fff}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 26px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;gap:12px}
.topbar h2{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;white-space:nowrap}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.content{padding:22px 26px;flex:1}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1}
.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:var(--navy-dark)}
.btn-ghost{background:transparent;border:1px solid var(--border-strong);color:var(--text)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red)}
.btn-gold{background:var(--gold-bg);border:1px solid var(--gold-border);color:var(--gold)}
.btn-sm{padding:4px 9px;font-size:12px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.card-hd{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.card-hd h3{font-family:'Syne',sans-serif;font-size:14px;font-weight:600}
.card-bd{padding:16px 18px}
.mb-16{margin-bottom:16px}.mb-12{margin-bottom:12px}.mt-12{margin-top:12px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);padding:8px 13px;text-align:left;font-size:10.5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:var(--navy-pale);color:var(--navy)}.b-green{background:var(--green-bg);color:var(--green)}
.b-gold{background:var(--gold-bg);color:var(--gold)}.b-red{background:var(--red-bg);color:var(--red)}
.b-gray{background:var(--surface2);color:var(--text-muted)}.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-purple{background:var(--purple-bg);color:var(--purple)}
.fg{margin-bottom:13px}.fg:last-child{margin-bottom:0}
.flabel{display:block;font-size:11.5px;font-weight:500;color:var(--text-muted);margin-bottom:4px;letter-spacing:.02em}
.fc{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.fc:focus{border-color:var(--navy-light)}
select.fc{cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surface);border-radius:var(--r-xl);box-shadow:0 8px 48px rgba(0,0,0,.18);width:100%;max-height:90vh;overflow-y:auto}
.modal-sm{max-width:420px}.modal-md{max-width:560px}.modal-lg{max-width:700px}
.modal-hd{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-hd h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:600}
.modal-bd{padding:20px}
.modal-ft{padding:13px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--surface)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;padding:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.flex{display:flex}.ai-c{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}.fw{flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px}
.stat-lbl{font-size:10.5px;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.stat-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1}
.stat-sub{font-size:11.5px;color:var(--text-hint);margin-top:3px}
.alert{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
.alert-info{background:var(--navy-pale);color:var(--navy);border:1px solid rgba(74,127,165,.25)}
.alert-warn{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-border)}
.alert-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.alert-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--text-muted);font-size:13px}
.empty{text-align:center;padding:44px 20px;color:var(--text-muted)}
.empty p{font-size:13px}
/* ── Calendar (day-wide, slots-as-rows) ── */
.cal-outer{overflow:auto;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);max-height:calc(100vh - 200px)}
.cal-tbl{border-collapse:collapse;font-size:12px;width:max-content;table-layout:fixed}

/* Top-left frozen corner */
.cal-corner{background:var(--bg);border-right:2px solid var(--border-mid);border-bottom:2px solid var(--border-mid);
  position:sticky;left:0;top:0;z-index:40;padding:8px 12px;vertical-align:bottom;min-width:160px;max-width:160px}
.cal-corner small{font-size:10px;color:var(--text-hint);font-weight:500;letter-spacing:.04em;text-transform:uppercase}

/* Day header cells */
.cal-day-hd{background:var(--bg);border-bottom:2px solid var(--border-mid);border-right:1px solid var(--border-mid);
  padding:7px 8px;text-align:center;position:sticky;top:0;z-index:20;min-width:200px;vertical-align:bottom}
.cal-day-hd.is-today{background:#EBF3FB}
.cal-day-name{font-size:9.5px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1px}
.cal-day-num{font-size:22px;font-weight:700;color:var(--text);font-family:'Syne',sans-serif;line-height:1}
.cal-day-hd.is-today .cal-day-num{color:var(--navy)}
.cal-day-month{font-size:9px;color:var(--text-hint);margin-top:1px}
.cal-day-hd.is-today .cal-day-month{color:var(--navy-light)}

/* Left lane header cells */
.cal-lane-hd{background:var(--bg);border-right:2px solid var(--border-mid);border-bottom:1px solid var(--border);
  position:sticky;left:0;z-index:10;vertical-align:middle;min-width:160px;max-width:160px;padding:0}
.cal-lane-inner{padding:8px 12px}
.cal-space-nm{font-size:11.5px;font-weight:700;color:var(--text);font-family:'Syne',sans-serif}
.cal-lane-nm{font-size:11px;color:var(--text-muted);margin-top:1px}
.cal-rates{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}

/* Slot sub-rows within each lane row — each day×lane intersection
   is divided into N slot rows stacked vertically */
.cal-slot-row{border-bottom:1px solid var(--border)}
.cal-slot-row:last-child{border-bottom:none}
.cal-slot-lh{background:var(--bg);border-right:2px solid var(--border-mid);position:sticky;left:0;z-index:10;
  padding:5px 10px 5px 14px;min-width:160px;max-width:160px;vertical-align:middle}
.cal-slot-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text-muted);white-space:nowrap}

/* Individual slot cells */
.cal-cell{border-right:1px solid var(--border);vertical-align:top;padding:5px 6px;min-width:200px;
  background:var(--surface);transition:background .12s;position:relative;min-height:52px}
.cal-cell.is-free{cursor:pointer}
.cal-cell.is-free:hover{background:var(--navy-pale)}
.cal-cell.is-today-col{background:#FAFCFF}
.cal-cell.is-today-col.is-free:hover{background:#EBF3FB}
.cal-cell.is-blocked{background:#FFF5F5!important;cursor:default}

/* Booking cards inside cells */
.bc{border-radius:6px;padding:6px 8px;cursor:pointer;transition:filter .12s, box-shadow .12s;
  font-size:11.5px;font-weight:500;line-height:1.4;position:relative;user-select:none}
.bc:hover{filter:brightness(.93);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.bc.dragging{opacity:.4;transform:scale(.97)}
.bc-team{font-weight:600;font-size:12px}
.bc-group{font-size:10.5px;opacity:.8;margin-top:1px}
.bc-cost{font-family:'DM Mono',monospace;font-size:10px;opacity:.75;margin-top:2px}
.bc-drag-handle{position:absolute;top:4px;right:5px;opacity:.4;cursor:grab;font-size:11px;line-height:1}
.bc:active .bc-drag-handle{cursor:grabbing}

/* Drop target highlight */
.cal-cell.drop-target{background:var(--navy-pale)!important;outline:2px dashed var(--navy-light)}

/* Empty slot add button */
.slot-add{display:none;position:absolute;inset:4px;border-radius:5px;background:transparent;border:1.5px dashed var(--border-strong);
  color:var(--text-hint);font-size:11px;cursor:pointer;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.cal-cell.is-free:hover .slot-add{display:flex}
.slot-add:hover{background:var(--navy-pale);border-color:var(--navy-light);color:var(--navy)}

/* chip/legend swatches */
.cp-pcss{background:#DBEAFE;color:#1E40AF}
.cp-rowmark{background:#D1FAE5;color:#065F46}
.cp-uofU{background:#FEF3C7;color:#92400E}
.cp-alpine{background:#E0F2EE;color:#0F5E4E}
.cp-summit{background:#EDE9FE;color:#4C1D95}
.cp-swiss{background:#F1F5F9;color:#475569}
.cp-other{background:#EDE9FE;color:#4C1D95}
.cp-mine{background:#FFEDD5;color:#9A3412}
.cp-blocked{background:#FEE2E2;color:#991B1B}
.cp-mine-card{background:#FFF7ED;color:#9A3412;border:1.5px solid rgba(154,58,18,.25)}
.cp-other-card{background:#F5F3FF;color:#4C1D95;border:1.5px solid rgba(91,63,168,.2)}
.cp-blocked-card{background:#FEF2F2;color:#991B1B;border:1.5px solid rgba(153,27,27,.2)}
.cp-pcss-card{background:#EFF6FF;color:#1E40AF;border:1.5px solid rgba(30,64,175,.2)}
.cp-rowmark-card{background:#F0FDF4;color:#065F46;border:1.5px solid rgba(6,95,70,.2)}
.cp-uofU-card{background:#FFFBEB;color:#92400E;border:1.5px solid rgba(146,64,14,.2)}
.cp-alpine-card{background:#ECFDF5;color:#0F5E4E;border:1.5px solid rgba(15,94,78,.2)}
.cp-summit-card{background:#F5F3FF;color:#4C1D95;border:1.5px solid rgba(76,29,149,.2)}
.cp-swiss-card{background:#F8FAFC;color:#475569;border:1.5px solid rgba(71,85,105,.2)}
/* builder */
.bl-sec{border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px}
.bl-sec-hd{background:var(--bg);padding:10px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.bl-sec-hd h4{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;display:flex;align-items:center;gap:7px}
.bl-item{padding:10px 15px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:var(--surface)}
.bl-item:last-child{border-bottom:none}
.bl-item-info strong{display:block;font-size:13px;font-weight:500}
.bl-item-info small{font-size:11.5px;color:var(--text-muted)}
.bl-actions{display:flex;gap:5px;flex-shrink:0}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.mono{font-family:'DM Mono',monospace}.text-muted{color:var(--text-muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}
.hidden{display:none!important}
#toast-root{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1A1916;color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:tIn .2s ease}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.warn{background:var(--gold)}
@keyframes tIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-rings"><span class="ring r1"></span><span class="ring r2"></span><span class="ring r3"></span><span class="ring r4"></span><span class="ring r5"></span></div>
      <h1>Olympic Park<br>Lane Management</h1>
      <p>Park City · Utah</p>
    </div>
    <div class="sb-user">
      <span class="sb-user-label">Signed in as</span>
      <span class="sb-user-name" id="sb-name">Administrator</span>
      <span class="sb-user-team" id="sb-team-lbl"></span>
    </div>
    <div class="nav-section" id="nav-menu"></div>
    <div class="sb-footer">
      <p>Demo Role</p>
      <select id="role-select">
        <option value="admin">Administrator</option>
        <option value="pcss">Team User — PCSS</option>
        <option value="rowmark">Team User — Rowmark</option>
        <option value="uofU">Team User — University of Utah</option>
      </select>
    </div>
  </nav>
  <div id="main">
    <div class="topbar"><h2 id="page-title">Dashboard</h2><div class="topbar-right" id="topbar-right"></div></div>
    <div class="content" id="content"><div class="loading-page"><div class="spinner"></div><span>Loading data…</span></div></div>
  </div>
</div>
<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
// ═══════════════════════════════════════
// STORAGE (window.storage API or localStorage fallback)
// ═══════════════════════════════════════
const Store = (() => {
  const PFX = 'oplm_';
  const hasAPI = typeof window.storage !== 'undefined';
  async function get(k) {
    try {
      if (hasAPI) { const r = await window.storage.get(PFX+k); return r ? JSON.parse(r.value) : null; }
      const v = localStorage.getItem(PFX+k); return v ? JSON.parse(v) : null;
    } catch { return null; }
  }
  async function set(k, v) {
    try {
      if (hasAPI) { await window.storage.set(PFX+k, JSON.stringify(v)); }
      else { localStorage.setItem(PFX+k, JSON.stringify(v)); }
    } catch(e) { console.error(e); }
  }
  return { get, set };
})();

// ═══════════════════════════════════════
// SEED DATA
// ═══════════════════════════════════════
const SEED = {
  teams:[
    {id:'pcss',name:'PCSS',status:'Residential',active:true},

    {id:'uofU',name:'University of Utah',status:'Residential',active:true},
    {id:'alpine',name:'Alpine Club Denver',status:'Local',active:true},

  ],

    {id:'g4',teamId:'rowmark',name:'Development'},{id:'g5',teamId:'rowmark',name:'Elite A'},
    {id:'g6',teamId:'uofU',name:"Men's Team"},{id:'g7',teamId:'uofU',name:"Women's Team"},
    {id:'g8',teamId:'alpine',name:'Senior Group'},{id:'g9',teamId:'summit',name:'Race Squad'},{id:'g10',teamId:'swiss',name:'Training Camp'},
  ],

    {id:'sp1',name:'Intermediate Hill',type:'Hill',season:'Winter',active:true},

  ],
  lanes:[
    {id:'l1',spaceId:'sp1',name:'Lane 1',rates:{Residential:50,Local:75,'Out-of-State':100,International:150}},
    {id:'l2',spaceId:'sp1',name:'Lane 2',rates:{Residential:50,Local:75,'Out-of-State':100,International:150}},
    {id:'l3',spaceId:'sp1',name:'Ramp A',rates:{Residential:60,Local:85,'Out-of-State':110,International:160}},
    {id:'l4',spaceId:'sp2',name:'Pool Lane 1',rates:{Residential:40,Local:60,'Out-of-State':80,International:120}},

let DB = {};
const KEYS = ['teams','groups','spaces','lanes','timeSlots','bookings'];

async function loadDB() {
  let fresh = true;
  for (const k of KEYS) {
    const v = await Store.get(k);
    if (v !== null) { DB[k] = v; fresh = false; }
    else DB[k] = JSON.parse(JSON.stringify(SEED[k]));
  }
  const seq = await Store.get('_seq');
  DB._seq = seq !== null ? seq : SEED._seq;
  if (fresh) await flushAll();
}

async function flushAll() { for (const k of KEYS) await Store.set(k, DB[k]); await Store.set('_seq', DB._seq); }
async function flush(...ks) { for (const k of ks) await Store.set(k, DB[k]); await Store.set('_seq', DB._seq); }
function nid(prefix) { DB._seq++; return prefix + DB._seq; }

let DG={bkId:null,fromLane:null,fromDate:null,fromSlot:null};

function buildCal(){
  const NUM=7; // one week
  const days=Array.from({length:NUM},(_,i)=>addDays(S.ganttStart,i));
  const rl=document.getElementById('cal-range');
  if(rl){
    const from=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const to=days[NUM-1].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    rl.textContent=`${from} – ${to}`;
  }

  // All active spaces and their lanes
  const spaces=DB.spaces.filter(sp=>sp.active);
  if(!spaces.length){
    document.getElementById('content').innerHTML=`<div class="empty"><p>No spaces configured.</p><button class="btn btn-primary" style="margin-top:12px" onclick="go('builder')">Open Builder</button></div>`;
    return;
  }

  // Legend
  const legendItems=isAdmin()
    ?[['cp-pcss','PCSS'],['cp-rowmark','Rowmark'],['cp-uofU','Univ. Utah'],['cp-alpine','Alpine'],['cp-summit','Summit'],['cp-swiss','Swiss'],['cp-blocked','Blocked']]
    :[['cp-mine','My Team'],['cp-other','Other Teams'],['cp-blocked','Blocked']];
  const legend=legendItems.map(([cls,lbl])=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text-muted)">
    <span style="display:inline-block;width:20px;height:10px;border-radius:3px" class="${cls}"></span>${lbl}</span>`).join('');

  // Day header row
  const dayHds=days.map(d=>{
    const isT=isoDate(d)===TODAY;
    return `<th class="cal-day-hd${isT?' is-today':''}">
      <div class="cal-day-name">${d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase()}</div>
      <div class="cal-day-num">${d.getDate()}</div>
      <div class="cal-day-month">${d.toLocaleDateString('en-US',{month:'short',year:'numeric'})}</div>
    </th>`;
  }).join('');

  // Body: for each space, for each lane, for each slot → one <tr> that spans all days
  let bodyRows='';
  spaces.forEach(sp=>{
    const lanes=DB.lanes.filter(l=>l.spaceId===sp.id);
    const slots=DB.timeSlots.filter(s=>s.spaceId===sp.id);
    if(!lanes.length)return;

    lanes.forEach((lane,li)=>{
      const rateInfo=isAdmin()?`<div class="cal-rates">${Object.entries(lane.rates).map(([t,r])=>`<span class="badge b-gray" style="font-size:9px;padding:1px 5px;font-family:'DM Mono',monospace">${t.charAt(0)}:${f$(r)}</span>`).join('')}</div>`:'';

      if(!slots.length){
        // Lane header + one empty row
        bodyRows+=`<tr>
          <td class="cal-lane-hd" style="border-bottom:2px solid var(--border-mid)">
            <div class="cal-lane-inner">
              <div class="cal-space-nm">${sp.name}</div>
              <div class="cal-lane-nm">${lane.name}</div>${rateInfo}
            </div>
          </td>
          ${days.map(d=>{
            const ds=isoDate(d);const isT=ds===TODAY;
            return `<td class="cal-cell is-free${isT?' is-today-col':''}" data-lane="${lane.id}" data-date="${ds}" data-slot="">
              <button class="slot-add" onclick="mBooking('${lane.id}','${ds}')">${I.plus()} Book</button>
            </td>`;
          }).join('')}
        </tr>`;
        return;
      }

      // For each slot, emit one row
      slots.forEach((slot,si)=>{
        const isLastSlot=si===slots.length-1;
        const isLastLane=li===lanes.length-1;
        const bottomBorder=isLastSlot?'border-bottom:2px solid var(--border-mid)':'';

        // Left header: show lane info only on first slot row of this lane
        const laneHd=si===0
          ?`<td class="cal-lane-hd" rowspan="${slots.length}" style="${isLastLane&&isLastSlot?'border-bottom:2px solid var(--border-mid)':''}">
              <div class="cal-lane-inner">
                <div class="cal-space-nm">${sp.name}</div>
                <div class="cal-lane-nm">${lane.name}</div>${rateInfo}
              </div>
            </td>`
          :''; // already spanned

        // Slot label on the left — sticky label column within the lane group
        const slotLhd=`<td class="cal-slot-lh" style="${bottomBorder}">
          <div class="cal-slot-label">${slot.label}</div>
        </td>`;

        const dayCells=days.map(d=>{
          const ds=isoDate(d);const isT=ds===TODAY;
          const bk=DB.bookings.find(b=>b.laneId===lane.id&&b.date===ds&&b.slotId===slot.id);

          if(bk){
            const isBlocked=bk.status==='Blocked';
            const editable=canEdit(bk);
            const cls=cardCls(bk.teamId);
            const teamNm=bk.teamId?lk.teamNm(bk.teamId):(bk.reason||'Blocked');
            const grpNm=bk.groupId?lk.groupNm(bk.groupId):'';
            const drag=editable&&!isBlocked?`draggable="true" ondragstart="dStart(event,'${bk.id}','${lane.id}','${ds}','${slot.id}')" ondragend="dEnd(event)"`:'';
            return `<td class="cal-cell is-today-col-${isT}" style="${bottomBorder};${isT?'background:#FAFCFF':''}" data-lane="${lane.id}" data-date="${ds}" data-slot="${slot.id}"
              ondragover="dOver(event)" ondragenter="dEnter(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${lane.id}','${ds}','${slot.id}')">
              <div class="bc ${cls}" ${drag} onclick="mViewBk('${bk.id}')">
                ${editable&&!isBlocked?`<span class="bc-drag-handle" title="Drag to move">⠿</span>`:''}
                <div class="bc-team">${isBlocked?'🚫 Blocked':teamNm}</div>
                ${grpNm?`<div class="bc-group">${grpNm}</div>`:''}
                <div class="bc-cost">${isBlocked?(bk.reason||''):`${f$(bk.cost)}/session`}</div>
              </div>
            </td>`;
          }

          // Empty cell
          return `<td class="cal-cell is-free${isT?' is-today-col':''}" style="${bottomBorder}" data-lane="${lane.id}" data-date="${ds}" data-slot="${slot.id}"
            ondragover="dOver(event)" ondragenter="dEnter(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${lane.id}','${ds}','${slot.id}')">
            <button class="slot-add" onclick="mBooking('${lane.id}','${ds}','${slot.id}')">${I.plus()} Book</button>
          </td>`;
        }).join('');

        bodyRows+=`<tr>${si===0?laneHd:''}${slotLhd}${dayCells}</tr>`;
      });
    });
  });

  const C=document.getElementById('content');
  // Adjust content padding for calendar full-bleed feel
  C.style.padding='14px 18px';
  C.innerHTML=`
    <div class="flex gap-12 mb-12 fw" style="align-items:center">${legend}
      <span style="margin-left:auto;font-size:11px;color:var(--text-hint)">Click to book · Drag booking card to reschedule</span>
    </div>
    <div class="cal-outer" id="cal-outer">
      <table class="cal-tbl" id="cal-tbl">
        <thead><tr>
          <th class="cal-corner" colspan="2"><small>Space / Lane / Slot</small></th>
          ${dayHds}
        </tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

// ── Drag & Drop ──
function dStart(e,bkId,laneId,date,slotId){
  DG={bkId,fromLane:laneId,fromDate:date,fromSlot:slotId};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',bkId);
  setTimeout(()=>e.target.closest('.bc')?.classList.add('dragging'),0);
}
function dEnd(e){
  e.target.closest('.bc')?.classList.remove('dragging');
  document.querySelectorAll('.drop-target').forEach(el=>el.classList.remove('drop-target'));
}
function dOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function dEnter(e){const td=e.currentTarget;if(td.classList.contains('is-free'))td.classList.add('drop-target');}
function dLeave(e){e.currentTarget.classList.remove('drop-target');}
async function dDrop(e,toLaneId,toDate,toSlotId){
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  if(!DG.bkId)return;
  if(toLaneId===DG.fromLane&&toDate===DG.fromDate&&toSlotId===DG.fromSlot)return;

  // Check for conflict at destination
  const conflict=DB.bookings.find(b=>b.id!==DG.bkId&&b.laneId===toLaneId&&b.date===toDate&&b.slotId===toSlotId);
  if(conflict){toast('That slot is already taken!','error');return;}

  const bk=DB.bookings.find(b=>b.id===DG.bkId);
  if(!bk||!canEdit(bk))return;

  // Update lane, date, slot; recalculate cost if lane changed
  const toLane=lk.lane(toLaneId);
  const toSpace=toLane?lk.space(toLane.spaceId):null;
  bk.laneId=toLaneId;
  bk.spaceId=toLane?.spaceId||bk.spaceId;
  bk.date=toDate;
  bk.slotId=toSlotId;
  if(bk.teamId&&toLane){bk.cost=lk.cost(toLaneId,bk.teamId);}

  await flush('bookings');
  toast(`Booking moved to ${toDate} · ${lk.slotLbl(toSlotId)}`);
  buildCal();
  DG={bkId:null};
}

function mBooking(preLane, preDate, preSlot){

    ?DB.teams.filter(t=>t.active).map(t=>`<option value="${t.id}">${t.name}</option>`).join('')
    :`<option value="${me}">${myTeam()?.name||''}</option>`;
  const preLaneObj=preLane?lk.lane(preLane):null;
  const preSpaceId=preLaneObj?preLaneObj.spaceId:'';

  openModal(`<div class="modal modal-md">
    <div class="modal-hd"><h3>New Booking</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div>
    <div class="modal-bd">
      <div class="g2">
        <div class="fg"><label class="flabel">Space</label>
          <select class="fc" id="nb-sp" onchange="nbSp()">
            <option value="">Select space…</option>
            ${spaces.map(s=>`<option value="${s.id}"${s.id===preSpaceId?' selected':''}>${s.name}</option>`).join('')}
          </select></div>
        <div class="fg"><label class="flabel">Lane</label>
          <select class="fc" id="nb-lane" onchange="nbCost()"><option value="">Select lane…</option></select></div>
      </div>
      <div class="g2">
        <div class="fg"><label class="flabel">Date</label>
          <input type="date" class="fc" id="nb-date" value="${preDate||TODAY}" onchange="nbConflict()"></div>
        <div class="fg"><label class="flabel">Time Slot</label>
          <select class="fc" id="nb-slot" onchange="nbConflict()"><option value="">Select slot…</option></select></div>
      </div>
      <div class="g2">
        <div class="fg"><label class="flabel">Team</label>
          <select class="fc" id="nb-team" onchange="nbTeam()" ${!isAdmin()?'disabled':''}>
            <option value="">Select team…</option>${teamOpts}</select></div>
        <div class="fg"><label class="flabel">Group</label>
          <select class="fc" id="nb-grp"><option value="">Select group…</option></select></div>
      </div>
      ${isAdmin()?`<div class="fg" style="margin-bottom:6px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="nb-blocked" onchange="nbBlock(this)" style="width:15px;height:15px;accent-color:var(--navy)">
          Mark as Blocked (admin only — maintenance/event)
        </label>
      </div>
      <div class="fg hidden" id="nb-reason-g"><label class="flabel">Reason</label>
        <input class="fc" id="nb-reason" placeholder="e.g. Maintenance"></div>`:''}
      <div id="nb-cost-p" class="alert alert-info hidden">Estimated cost: <strong id="nb-cost-v" class="mono"></strong></div>
      <div id="nb-conflict-p" class="alert alert-warn hidden">This lane/slot is already booked on that date.</div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitBk()">${I.check()} Book Lane</button>
    </div>
  </div>`);

  if(preSpaceId) nbSp(preLane, preSlot);
  if(!isAdmin()){const t=document.getElementById('nb-team');if(t){t.value=me;nbTeam();}}
}

function nbSp(preLane, preSlot){
  const spId=document.getElementById('nb-sp').value;
  const laneEl=document.getElementById('nb-lane');
  const slotEl=document.getElementById('nb-slot');
  const lanes=DB.lanes.filter(l=>l.spaceId===spId);
  const slots=DB.timeSlots.filter(s=>s.spaceId===spId);
  laneEl.innerHTML='<option value="">Select lane…</option>'+lanes.map(l=>`<option value="${l.id}"${l.id===preLane?' selected':''}>${l.name}</option>`).join('');
  slotEl.innerHTML='<option value="">Select slot…</option>'+slots.map(s=>`<option value="${s.id}"${s.id===preSlot?' selected':''}>${s.label}</option>`).join('');
  if(preLane)laneEl.value=preLane;
  if(preSlot)slotEl.value=preSlot;
  nbCost();nbConflict();
}
function nbTeam(){
  const tid=document.getElementById('nb-team').value;
  const gEl=document.getElementById('nb-grp');
  gEl.innerHTML='<option value="">Select group…</option>'+DB.groups.filter(g=>g.teamId===tid).map(g=>`<option value="${g.id}">${g.name}</option>`).join('');
  nbCost();
}
function nbBlock(cb){
  document.getElementById('nb-reason-g').classList.toggle('hidden',!cb.checked);
  nbCost();
}
function nbCost(){
  const laneId=document.getElementById('nb-lane').value;
  const teamId=document.getElementById('nb-team').value;
  const isBlocked=document.getElementById('nb-blocked')?.checked;
  const p=document.getElementById('nb-cost-p');const v=document.getElementById('nb-cost-v');
  if(!laneId||!teamId||isBlocked){p&&p.classList.add('hidden');return;}
  const cost=lk.cost(laneId,teamId);const team=lk.team(teamId);
  v.textContent=`${f$(cost)} / session (${team?.status} rate)`;p.classList.remove('hidden');
}
function nbConflict(){
  const laneId=document.getElementById('nb-lane').value;
  const date=document.getElementById('nb-date').value;
  const slotId=document.getElementById('nb-slot').value;
  const el=document.getElementById('nb-conflict-p');if(!el)return;
  const conflict=laneId&&date&&slotId&&DB.bookings.find(b=>b.laneId===laneId&&b.date===date&&b.slotId===slotId);
  el.classList.toggle('hidden',!conflict);
}
async function submitBk(){
  const spaceId=document.getElementById('nb-sp').value;
  const laneId=document.getElementById('nb-lane').value;
  const date=document.getElementById('nb-date').value;
  const slotId=document.getElementById('nb-slot').value;
  const teamId=document.getElementById('nb-team').value;
  const groupId=document.getElementById('nb-grp').value;
  const isBlocked=document.getElementById('nb-blocked')?.checked||false;
  const reason=document.getElementById('nb-reason')?.value||'';
  if(!spaceId||!laneId||!date||!slotId||(!isBlocked&&!teamId)){toast('Please fill in all required fields.','warn');return;}
  if(DB.bookings.find(b=>b.laneId===laneId&&b.date===date&&b.slotId===slotId)){toast('This slot is already booked!','error');return;}
  const cost=(!isBlocked&&teamId)?lk.cost(laneId,teamId):0;
  DB.bookings.push({
    id:nid('b'),laneId,spaceId,date,slotId,
    teamId:isBlocked?null:teamId,
    groupId:groupId||null,
    createdBy:isAdmin()?'admin':myId(),
    status:isBlocked?'Blocked':'Active',
    cost,reason:isBlocked?reason:undefined
  });
  await flush('bookings');closeModal();toast('Booking created!');renderPage();
}

function mAddLane(preSpId){openModal(`<div class="modal modal-md"><div class="modal-hd"><h3>Add Lane</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div><div class="modal-bd">${laneFormHtml(preSpId||DB.spaces[0]?.id,null)}</div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLane()">Add Lane</button></div></div>`);}
async function saveLane(){

async function updLane(id){

  await flush('lanes');closeModal();toast('Lane updated!');renderPage();
}
async function dLane(id){if(!confirm('Delete lane?'))return;DB.lanes=DB.lanes.filter(l=>l.id!==id);await flush('lanes');toast('Lane deleted.');renderPage();}

    <tbody>${DB.teams.map(t=>{
      const bk=active.filter(b=>b.teamId===t.id);const rev=bk.reduce((s,b)=>s+b.cost,0);

        <td>${DB.groups.filter(g=>g.teamId===t.id).length}</td><td>${bk.length}</td><td class="mono">${f$(rev)}</td>

  <div class="fg"><label class="flabel">Status Tier</label><select class="fc" id="tm-s">${['Residential','Local','Out-of-State','International'].map(s=>`<option${t&&t.status===s?' selected':''}>${s}</option>`).join('')}</select></div>`;}
function mAddTeam(){openModal(`<div class="modal modal-sm"><div class="modal-hd"><h3>Add Team</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div><div class="modal-bd">${teamFormHtml(null)}</div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveTeam()">Add</button></div></div>`);}
async function saveTeam(){const n=document.getElementById('tm-n').value.trim();if(!n){toast('Name required','warn');return;}DB.teams.push({id:nid('team'),name:n,status:document.getElementById('tm-s').value,active:true});await flush('teams');closeModal();toast('Team added!');renderPage();}
function mEditTeam(id){const t=DB.teams.find(tm=>tm.id===id);openModal(`<div class="modal modal-sm"><div class="modal-hd"><h3>Edit Team</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div><div class="modal-bd">${teamFormHtml(t)}</div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updTeam('${id}')">Save</button></div></div>`);}
async function updTeam(id){const t=DB.teams.find(tm=>tm.id===id);t.name=document.getElementById('tm-n').value.trim()||t.name;t.status=document.getElementById('tm-s').value;await flush('teams');closeModal();toast('Team updated!');renderPage();}
async function togTeam(id){const t=DB.teams.find(tm=>tm.id===id);t.active=!t.active;await flush('teams');toast(`Team ${t.active?'activated':'deactivated'}.`);renderPage();}

  `<div class="card"><div class="tbl-wrap"><table>
    <thead><tr><th>Group Name</th>${isAdmin()?'<th>Team</th>':''}<th></th></tr></thead>
    <tbody>${vis.length===0?`<tr><td colspan="3"><div class="empty"><p>No groups yet.</p></div></td></tr>`:

function grpFormHtml(g){return (isAdmin()?`<div class="fg"><label class="flabel">Team</label><select class="fc" id="gr-t">${DB.teams.map(t=>`<option value="${t.id}"${g&&g.teamId===t.id?' selected':''}>${t.name}</option>`).join('')}</select></div>`:`<input type="hidden" id="gr-t" value="${myId()}">`)+
  `<div class="fg"><label class="flabel">Group Name</label><input class="fc" id="gr-n" value="${g?g.name:''}" placeholder="e.g. U14 Boys"></div>`;}
function mAddGroup(){openModal(`<div class="modal modal-sm"><div class="modal-hd"><h3>Add Group</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div><div class="modal-bd">${grpFormHtml(null)}</div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveGrp()">Add</button></div></div>`);}
async function saveGrp(){const n=document.getElementById('gr-n').value.trim();const tid=document.getElementById('gr-t').value;if(!n||!tid){toast('Fill all fields','warn');return;}DB.groups.push({id:nid('g'),teamId:tid,name:n});await flush('groups');closeModal();toast('Group added!');renderPage();}
function mEditGrp(id){const g=DB.groups.find(gr=>gr.id===id);openModal(`<div class="modal modal-sm"><div class="modal-hd"><h3>Edit Group</h3><button class="close-btn" onclick="closeModal()">${I.x()}</button></div><div class="modal-bd">${grpFormHtml(g)}</div><div class="modal-ft"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="updGrp('${id}')">Save</button></div></div>`);}
async function updGrp(id){const g=DB.groups.find(gr=>gr.id===id);g.name=document.getElementById('gr-n').value.trim()||g.name;g.teamId=document.getElementById('gr-t').value;await flush('groups');closeModal();toast('Group updated!');renderPage();}

// INVOICING
// ═══════════════════════════════════════
function pgInvoicing(){
  if(!isAdmin()){document.getElementById('content').innerHTML='<div class="alert alert-warn">Admin only.</div>';return;}
  document.getElementById('topbar-right').innerHTML=`<button class="btn btn-gold" onclick="exportCSV()">${I.dl()} Export CSV</button>`;
  document.getElementById('content').innerHTML=`
  <div class="card mb-16"><div class="card-hd"><h3>Filters</h3></div><div class="card-bd"><div class="flex gap-8 fw ai-c">
    <div><label class="flabel">Team</label><select class="fc" id="inv-t" style="width:180px"><option value="">All Teams</option>${DB.teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}</select></div>
    <div><label class="flabel">Space</label><select class="fc" id="inv-sp" style="width:160px"><option value="">All Spaces</option>${DB.spaces.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select></div>
    <div><label class="flabel">From</label><input type="date" class="fc" id="inv-from" value="2025-03-01" style="width:140px"></div>
    <div><label class="flabel">To</label><input type="date" class="fc" id="inv-to" value="2025-03-31" style="width:140px"></div>
    <div style="align-self:flex-end"><button class="btn btn-primary" onclick="genRpt()">Generate</button></div>
  </div></div></div>
  <div id="inv-res"></div>`;
  genRpt();
}
function getFiltBks(){
  let bks=DB.bookings.filter(b=>b.status==='Active');
  const t=document.getElementById('inv-t').value;const sp=document.getElementById('inv-sp').value;
  const fr=document.getElementById('inv-from').value;const to=document.getElementById('inv-to').value;
  if(t)bks=bks.filter(b=>b.teamId===t);if(sp)bks=bks.filter(b=>b.spaceId===sp);
  if(fr)bks=bks.filter(b=>b.date>=fr);if(to)bks=bks.filter(b=>b.date<=to);
  return bks;
}
function genRpt(){
  const bks=getFiltBks();const R=document.getElementById('inv-res');
  if(!bks.length){R.innerHTML='<div class="empty"><p>No bookings match the filters.</p></div>';return;}
  const byT={};bks.forEach(b=>{if(!byT[b.teamId])byT[b.teamId]=[];byT[b.teamId].push(b);});
  const grand=bks.reduce((s,b)=>s+b.cost,0);
  R.innerHTML=`<div class="card mb-16"><div class="card-hd"><h3>Summary</h3><span class="mono" style="font-size:15px;font-weight:600">Grand Total: ${f$(grand)}</span></div>
    <div class="tbl-wrap"><table><thead><tr><th>Team</th><th>Status</th><th>Sessions</th><th>Total</th></tr></thead><tbody>
      ${Object.entries(byT).map(([tid,tb])=>{const t=lk.team(tid);const tot=tb.reduce((s,b)=>s+b.cost,0);
        return `<tr><td><strong>${t?t.name:'Unknown'}</strong></td><td>${t?statusBadge(t.status):''}</td><td>${tb.length}</td><td class="mono" style="font-weight:600">${f$(tot)}</td></tr>`;}).join('')}
    </tbody></table></div></div>
  ${Object.entries(byT).map(([tid,tb])=>{const t=lk.team(tid);const tot=tb.reduce((s,b)=>s+b.cost,0);
    return `<div class="card mb-16"><div class="card-hd"><div class="flex ai-c gap-8"><h3>${t?t.name:'?'}</h3>${t?statusBadge(t.status):''}</div><span class="mono" style="font-size:14px;font-weight:600">${f$(tot)}</span></div>
      <div class="tbl-wrap"><table><thead><tr><th>Date</th><th>Space</th><th>Lane</th><th>Slot</th><th>Group</th><th>Tier</th><th>Cost</th></tr></thead><tbody>
        ${tb.map(b=>`<tr><td class="mono text-sm">${b.date}</td><td>${lk.spaceNm(b.spaceId)}</td><td>${lk.laneNm(b.laneId)}</td><td>${lk.slotLbl(b.slotId)}</td><td>${b.groupId?lk.groupNm(b.groupId):'—'}</td><td>${t?statusBadge(t.status):''}</td><td class="mono">${f$(b.cost)}</td></tr>`).join('')}
        <tr style="background:var(--bg)"><td colspan="6" style="text-align:right;font-size:11px;color:var(--text-muted);font-weight:500">SUBTOTAL</td><td class="mono" style="font-weight:600">${f$(tot)}</td></tr>
      </tbody></table></div></div>`;}).join('')}`;
}
function exportCSV(){
  const bks=getFiltBks();
  const rows=bks.map(b=>{const t=lk.team(b.teamId);return [b.date,t?t.name:'',t?t.status:'',lk.spaceNm(b.spaceId),lk.laneNm(b.laneId),lk.slotLbl(b.slotId),b.groupId?lk.groupNm(b.groupId):'',b.cost].join(',');});
  const blob=new Blob(['Date,Team,Status,Space,Lane,Slot,Group,Cost\n'+rows.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='op-report.csv';a.click();toast('CSV exported!');
}
